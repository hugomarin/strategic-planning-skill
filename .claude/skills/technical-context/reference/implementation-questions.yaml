# implementation-questions.yaml
# Reference file for the Implementation Context Skill.
#
# Purpose:
#   Provides the agent with structured evaluation criteria for each implementation artifact.
#   Used in two moments:
#     1. During diagnostic phase: to build the coverage map against Input/ documents.
#     2. During artifact generation: to verify each section is agent-executable before closing the file.
#
# Core test for every answer:
#   "Can BUILD implement this without asking a single question?"
#   If not, the answer fails — regardless of how detailed it looks.
#
# Structure per question:
#   id:               unique identifier (artifact prefix + number)
#   question:         what the agent must be able to answer from the artifact
#   section:          which section of the artifact this maps to
#   type:             required | conditional | advisory
#                     required    = artifact is incomplete without this answer
#                     conditional = only applies when the product or roadmap includes the relevant capability
#                     advisory    = artifact is weaker without this answer, but can proceed with NHR marker
#   failure_signal:   what a bad or insufficient answer looks like
#   needs_human_review_if: condition that triggers a Needs Human Review marker

artifacts:

  # ─────────────────────────────────────────────
  # STACK
  # ─────────────────────────────────────────────

  - artifact: stack
    description: >
      Evaluates whether the proposed technology stack is coherent with the product,
      roadmap, target platforms, business model, operational needs, security model,
      and implementation capacity. Must be specific enough that BUILD can understand
      which technologies are structural decisions, which are replaceable implementation
      choices, and which assumptions still require validation.

    questions:

      - id: SK-01
        question: "Does the proposed stack match the product stage and roadmap?"
        section: Product / Roadmap Fit
        type: required
        failure_signal: >
          The stack is evaluated only for the current feature set, without explaining
          whether it supports the next roadmap phases, expected scale, team capacity,
          business constraints, or known future needs.
        needs_human_review_if: >
          The selected technologies solve the immediate prototype but may block or
          complicate known roadmap needs such as collaboration, payments, mobile,
          analytics, integrations, AI workflows, admin tooling, compliance, or scale.

      - id: SK-02
        question: "Is the application architecture clearly defined?"
        section: Application Architecture
        type: required
        failure_signal: >
          The proposal names technologies but does not define whether the system is a
          monolith, modular monolith, client-server app, serverless architecture,
          microservices system, event-driven system, mobile app with backend, desktop
          app with cloud services, API-only backend, or hybrid architecture.
        needs_human_review_if: >
          BUILD would need to infer the architectural pattern from the tools instead
          of following an explicit architectural decision.

      - id: SK-03
        question: "Are frontend and backend responsibilities clearly separated?"
        section: Frontend / Backend Boundary
        type: required
        failure_signal: >
          The proposal does not define what logic lives in the client, what logic lives
          on the server, what is shared, and what must never be handled client-side.
        needs_human_review_if: >
          Business rules, permissions, validations, data transformations, secrets,
          paid-access checks, or sensitive operations could be implemented inconsistently
          across frontend and backend.

      - id: SK-04
        question: "Are the target platforms and devices clearly defined?"
        section: Platforms / Devices
        type: required
        failure_signal: >
          The proposal does not define whether the product is web, mobile, desktop,
          tablet, embedded, browser extension, CLI, API-only, or multi-platform.
          Without this, stack decisions may be made for the wrong runtime,
          distribution model, interaction pattern, or device constraints.
        needs_human_review_if: >
          The product experience could plausibly require web, mobile, desktop,
          native capabilities, offline support, background execution, push
          notifications, local files, camera, location, Bluetooth, system tray,
          browser APIs, app store distribution, or cross-platform synchronization,
          but the target platforms are not explicitly defined.

      - id: SK-05
        question: "Does the stack account for platform-specific capabilities and constraints?"
        section: Platforms / Devices
        type: conditional
        failure_signal: >
          The proposal assumes that the same stack can serve every platform without
          identifying differences in navigation, storage, permissions, offline behavior,
          performance, notifications, file access, native APIs, deployment, or release
          process.
        needs_human_review_if: >
          The roadmap includes mobile, desktop, native app behavior, browser extension,
          offline mode, device-specific APIs, app store distribution, or background
          processing, but the stack does not explain how those requirements will be supported.

      - id: SK-06
        question: "Is the authentication and identity model defined?"
        section: Authentication / Identity
        type: required
        failure_signal: >
          The proposal does not define how users authenticate, whether auth is handled
          internally or by a provider, which identity model is used, and how sessions,
          tokens, passwordless login, OAuth, SSO, invitations, or account recovery are handled.
        needs_human_review_if: >
          The product has user accounts, private data, paid access, teams, organizations,
          admin roles, shared resources, or customer-owned data, but authentication strategy
          is missing or treated as an implementation detail.

      - id: SK-07
        question: "Is the authorization model separated from authentication?"
        section: Authorization / Permissions
        type: required
        failure_signal: >
          The proposal defines login but does not define what authenticated users are
          allowed to see or do across roles, teams, organizations, resources, plans,
          ownership boundaries, admin actions, or shared links.
        needs_human_review_if: >
          The product includes multiple users, roles, teams, clients, tenants,
          collaborators, internal admins, paid plans, or public/private resources,
          but access rules are not explicit.

      - id: SK-08
        question: "Are API boundaries and service responsibilities defined?"
        section: APIs / Services
        type: required
        failure_signal: >
          The proposal does not define whether the system exposes REST, GraphQL, RPC,
          internal service APIs, external APIs, webhooks, SDKs, or background service
          interfaces.
        needs_human_review_if: >
          Features depend on communication between frontend, backend, external providers,
          background jobs, internal services, or third-party systems, but the interface
          contracts are not defined.

      - id: SK-09
        question: "Are external integrations and third-party services explicitly identified?"
        section: Integrations
        type: conditional
        failure_signal: >
          The product requires external capabilities such as payments, email, auth,
          storage, analytics, AI providers, maps, CRM, calendar, messaging, search,
          notifications, customer support, document generation, or file processing,
          but the proposal does not identify the provider, integration boundary,
          fallback behavior, or ownership.
        needs_human_review_if: >
          A feature assumes an external service but the stack does not define whether
          it is required, optional, replaceable, deferred, or abstracted behind an
          internal service boundary.

      - id: SK-10
        question: "Is asynchronous processing or messaging required?"
        section: Async / Messaging
        type: conditional
        failure_signal: >
          The product includes long-running, scheduled, event-driven, high-volume,
          cross-service, or retry-sensitive operations, but the proposal does not
          define queues, workers, background jobs, event buses, pub/sub, retries,
          dead-letter handling, idempotency, or job status tracking.
        needs_human_review_if: >
          The system may need to process tasks outside the request/response lifecycle,
          but the proposal does not define whether this is required now, later, or not at all.

      - id: SK-11
        question: "Does the stack support the product's transactional requirements?"
        section: Transactions
        type: required
        failure_signal: >
          The proposal does not identify which operations must be atomic, consistent,
          reversible, idempotent, audited, or protected against race conditions.
        needs_human_review_if: >
          The product includes payments, inventory, permissions, credits, bookings,
          workflow state, financial records, irreversible actions, subscriptions,
          quotas, or multi-step writes without a transaction strategy.

      - id: SK-12
        question: "Are email, notification, and communication needs explicitly considered?"
        section: Communications
        type: conditional
        failure_signal: >
          The product likely needs transactional email, notifications, invitations,
          reminders, alerts, receipts, reports, onboarding messages, approval messages,
          or system messages, but the proposal does not define whether these exist,
          which provider handles them, or which events trigger them.
        needs_human_review_if: >
          User flows depend on communication outside the app but no communication
          layer is defined.

      - id: SK-13
        question: "Are environments and deployment targets defined?"
        section: Environments / Deployment
        type: required
        failure_signal: >
          The proposal does not distinguish local development, preview, staging,
          production, testing, demo, or sandbox environments, nor how configuration
          differs across them.
        needs_human_review_if: >
          BUILD would need to decide whether to deploy directly to production, create
          staging, manage environment variables, seed data, test migrations, or configure
          separate services per environment.

      - id: SK-14
        question: "Does the stack define how configuration and secrets are managed?"
        section: Configuration / Secrets
        type: required
        failure_signal: >
          The proposal references API keys, database credentials, tokens, provider
          secrets, environment variables, or service credentials without defining where
          they live, who owns them, how they differ by environment, and what can or
          cannot be exposed client-side.
        needs_human_review_if: >
          Sensitive configuration could be committed to code, exposed to the client,
          duplicated across environments, manually managed, or inconsistently rotated.

      - id: SK-15
        question: "Does the stack include the minimum operational layer needed for the product?"
        section: Operations
        type: required
        failure_signal: >
          The proposal focuses on building features but does not define logging,
          monitoring, error tracking, health checks, deployment visibility, backups,
          alerts, incident diagnosis, or operational ownership.
        needs_human_review_if: >
          The product will run with real users, paid customers, critical data, external
          dependencies, or production workflows, but the stack has no operational plan.

      - id: SK-16
        question: "Is the stack cost model aligned with the business model?"
        section: Cost / Business Model
        type: required
        failure_signal: >
          The proposal does not identify the main cost drivers or how infrastructure
          costs relate to pricing, free tier limits, usage caps, customer value, margins,
          or unit economics.
        needs_human_review_if: >
          The product depends on usage-based services, AI calls, storage, bandwidth,
          background processing, external APIs, managed infrastructure, or high-volume
          operations without a cost strategy.

      - id: SK-17
        question: "Are migration and reversibility risks understood?"
        section: Migration / Reversibility
        type: required
        failure_signal: >
          The proposal does not define which choices are easy to change later and which
          would require data migration, architecture rewrite, vendor migration, workflow
          migration, or customer-facing disruption.
        needs_human_review_if: >
          A major technology choice is being made early without understanding its lock-in,
          migration path, operational dependency, or long-term cost.

      - id: SK-18
        question: "Does the stack avoid overengineering for the current product stage?"
        section: Product / Roadmap Fit
        type: advisory
        failure_signal: >
          The proposal introduces services, queues, microservices, event buses, native apps,
          complex permissions, analytics pipelines, multi-region infrastructure, or advanced
          deployment complexity before there is evidence that the product stage requires them.
        needs_human_review_if: >
          The stack is technically impressive but may slow down learning, increase maintenance
          burden, or create unnecessary implementation surface.

      - id: SK-19
        question: "Does the stack avoid underengineering known roadmap needs?"
        section: Product / Roadmap Fit
        type: advisory
        failure_signal: >
          The proposal is optimized for speed today but ignores known near-term needs such
          as authentication, payments, teams, permissions, integrations, background jobs,
          analytics, mobile, desktop, operational tooling, or production support.
        needs_human_review_if: >
          A shortcut is acceptable for MVP, but the proposal does not mark it as temporary
          or explain the migration path.

  # ─────────────────────────────────────────────
  # DATABASE / SCHEMA
  # ─────────────────────────────────────────────

  - artifact: database_schema
    description: >
      Evaluates whether the proposed database, schema, and data architecture can
      represent the product's domain, access patterns, permissions, transactions,
      migrations, environments, lifecycle, analytics, and operational requirements.
      Must be specific enough that BUILD can understand what data is source-of-truth,
      what is derived, what is temporary, what must be protected, and how the schema
      can evolve safely.

    questions:

      - id: DB-01
        question: "Is the selected database type appropriate for the product's data shape and access patterns?"
        section: Database Choice
        type: required
        failure_signal: >
          The proposal selects a database without explaining whether the product needs
          relational data, document storage, graph relationships, time-series data,
          full-text search, analytics workloads, cache, object storage, event storage,
          or a combination.
        needs_human_review_if: >
          The product's core data model or queries suggest a different database type
          than the one proposed, or multiple storage systems may be needed.

      - id: DB-02
        question: "Does the schema define the main domain entities and their relationships?"
        section: Domain Model
        type: required
        failure_signal: >
          The proposal names tables or collections without explaining the real-world
          entities they represent, how they relate, and which entity owns which data.
        needs_human_review_if: >
          BUILD would need to infer cardinality, ownership, parent-child relationships,
          entity boundaries, or lifecycle rules.

      - id: DB-03
        question: "Are the product's core access patterns known before finalizing the schema?"
        section: Access Patterns
        type: required
        failure_signal: >
          The schema is designed around entities but not around the queries, filters,
          joins, aggregations, lists, dashboards, admin views, reports, exports, or API
          responses the product must support.
        needs_human_review_if: >
          Important views or features may require expensive queries, denormalization,
          indexing, materialized views, search infrastructure, read models, or analytics
          pipelines that are not considered.

      - id: DB-04
        question: "Are consistency and transaction requirements defined?"
        section: Consistency / Transactions
        type: required
        failure_signal: >
          The schema does not identify which operations must be atomic, strongly consistent,
          eventually consistent, idempotent, reversible, audited, or protected from
          concurrent writes.
        needs_human_review_if: >
          The product includes financial data, inventory, booking, permissions, workflow
          state, credits, quotas, subscriptions, shared resources, or irreversible actions
          without a consistency strategy.

      - id: DB-05
        question: "Is there a migration strategy for schema changes?"
        section: Migrations
        type: required
        failure_signal: >
          The proposal does not define how schema changes are created, reviewed, applied,
          rolled back, tested, versioned, or coordinated across development, staging,
          production, and deployed application code.
        needs_human_review_if: >
          The database will evolve while users, production data, integrations, or active
          workflows exist, but migration practices are absent.

      - id: DB-06
        question: "Are staging, production, and development databases separated or intentionally combined?"
        section: Environments
        type: required
        failure_signal: >
          The proposal does not define whether each environment has its own database,
          whether seed data exists, whether production data can be copied, how test data
          is isolated, or how environment-specific configuration is managed.
        needs_human_review_if: >
          BUILD could accidentally test against production, rely on manual seed data,
          create environment-specific behavior, or apply migrations without a safe path.

      - id: DB-07
        question: "Are data ownership and source-of-truth rules defined?"
        section: Source of Truth
        type: required
        failure_signal: >
          The proposal does not define which system owns each important data object,
          especially when data is duplicated across database, cache, external provider,
          client state, files, analytics tools, search indexes, or third-party systems.
        needs_human_review_if: >
          Two systems could update or represent the same data without a clear authority,
          synchronization strategy, or conflict-resolution rule.

      - id: DB-08
        question: "Are permissions enforced in the data model, application layer, database layer, or all three?"
        section: Permissions / Security
        type: required
        failure_signal: >
          The proposal does not explain how users, roles, teams, organizations, admins,
          public links, shared resources, internal services, or external integrations
          are allowed to access data.
        needs_human_review_if: >
          The product has multiple users, roles, customers, teams, tenants, sensitive
          data, paid plans, or admin actions but lacks an authorization model.

      - id: DB-09
        question: "Does the schema account for auditability and historical records where needed?"
        section: Audit / History
        type: conditional
        failure_signal: >
          The product requires accountability, compliance, review, undo, workflow history,
          financial traceability, moderation history, admin actions, or user activity records,
          but the schema only stores current state.
        needs_human_review_if: >
          Important business actions may need to be inspected later but the proposal does
          not define event logs, audit tables, versioning, immutable records, or change history.

      - id: DB-10
        question: "Is data retention, deletion, and lifecycle management defined?"
        section: Data Lifecycle
        type: required
        failure_signal: >
          The proposal does not define what data is temporary, permanent, archived,
          user-deletable, automatically deleted, anonymized, soft-deleted, hard-deleted,
          retained for compliance, or retained for analytics.
        needs_human_review_if: >
          The product stores personal, sensitive, customer, generated, uploaded, high-volume,
          or business-critical data without a lifecycle policy.

      - id: DB-11
        question: "Are backup, restore, and recovery expectations defined?"
        section: Backup / Recovery
        type: required
        failure_signal: >
          The database plan does not define backup frequency, restore process, recovery
          expectations, point-in-time recovery, acceptable data loss, or operational ownership.
        needs_human_review_if: >
          The product will store user-critical, business-critical, paid, sensitive, or
          hard-to-recreate data but has no recovery strategy.

      - id: DB-12
        question: "Does the schema support analytics and reporting needs without damaging the transactional model?"
        section: Analytics / Reporting
        type: conditional
        failure_signal: >
          The product or business needs metrics, dashboards, reports, funnels, usage tracking,
          customer analytics, operational analytics, billing metrics, or admin reporting,
          but the proposal does not define whether analytics live in the primary database,
          event pipeline, warehouse, external tool, or derived read model.
        needs_human_review_if: >
          Reporting requirements could create heavy queries, duplicated data, unclear
          source-of-truth boundaries, privacy issues, or degraded production performance.

      - id: DB-13
        question: "Are performance, indexing, and scaling assumptions defined?"
        section: Performance / Indexing
        type: required
        failure_signal: >
          The proposal defines tables or collections but not expected data volume,
          read/write patterns, indexes, pagination, query limits, caching, partitioning,
          archival, or expected growth.
        needs_human_review_if: >
          Core product screens, APIs, dashboards, reports, search, or background processes
          could become slow because access patterns and indexes are not defined.

      - id: DB-14
        question: "Are large objects, files, media, or generated artifacts stored in the right layer?"
        section: Storage
        type: conditional
        failure_signal: >
          The proposal stores files, images, PDFs, exports, logs, generated content,
          media, snapshots, or large payloads directly in the primary database without
          considering object storage, CDN, lifecycle, access control, or cost.
        needs_human_review_if: >
          The product needs file handling or generated artifacts but the storage boundary
          between database, object storage, cache, and external provider is unclear.

      - id: DB-15
        question: "Does the schema avoid premature complexity while preserving a migration path?"
        section: Schema Scope
        type: advisory
        failure_signal: >
          The schema models future concepts too early or stays too flat for known near-term
          needs, without explaining what is intentionally deferred and how the model can evolve.
        needs_human_review_if: >
          The schema may either slow down MVP implementation through overmodeling or create
          future migration pain through underdefined entities and relationships.

  # ─────────────────────────────────────────────
  # FEATURES
  # ─────────────────────────────────────────────

  - artifact: features
    description: >
      Evaluates whether proposed product capabilities are valuable, bounded,
      technically supported, and ready to become feature specs. Must be specific
      enough that BUILD can understand what each feature does, what it does not do,
      what data and runtime capabilities it depends on, and what would make it
      acceptable or incomplete.

    questions:

      - id: FN-01
        question: "Is each proposed feature tied to a specific user problem or product objective?"
        section: Feature Value
        type: required
        failure_signal: >
          A feature exists because it is technically possible, expected in the category,
          or mentioned in the roadmap, but the proposal does not explain what user pain,
          behavior, business goal, or product outcome makes it necessary.
        needs_human_review_if: >
          The feature does not clearly support the core loop, product thesis, MVP learning
          goal, user value proposition, retention path, revenue path, or operational need.

      - id: FN-02
        question: "Is the feature's MVP boundary clearly separated from its mature version?"
        section: Feature Scope
        type: required
        failure_signal: >
          The feature combines several levels of ambition without saying what must be built
          first, what can wait, what should be intentionally excluded, and what belongs in
          a later version.
        needs_human_review_if: >
          The feature could expand into multiple product surfaces, workflows, integrations,
          admin needs, automations, notifications, exports, permissions, or analytics without
          a clear boundary.

      - id: FN-03
        question: "Does the feature define what user action starts it and what user value ends it?"
        section: Feature Flow
        type: required
        failure_signal: >
          The feature is described as a capability but does not define the initiating user
          action, system response, output, and user-facing success state.
        needs_human_review_if: >
          BUILD would need to invent the user interaction, success condition, completion
          state, or expected result for the feature.

      - id: FN-04
        question: "Are the feature's technical dependencies explicit across frontend, backend, database, APIs, services, and external providers?"
        section: Technical Dependencies
        type: required
        failure_signal: >
          The feature assumes capabilities from the stack, database, APIs, background jobs,
          integrations, permissions, emails, notifications, payments, AI, storage, search,
          analytics, or external providers without declaring them.
        needs_human_review_if: >
          BUILD would need to discover or invent technical dependencies while implementing
          the feature.

      - id: FN-05
        question: "Does the feature define what data it reads, creates, updates, or deletes?"
        section: Data Operations
        type: required
        failure_signal: >
          The feature describes UI or behavior but does not define which entities, records,
          files, jobs, events, permissions, reports, or state transitions it touches.
        needs_human_review_if: >
          The feature would require BUILD to invent database operations, create fields,
          define state transitions, or modify entities not defined in the schema.

      - id: FN-06
        question: "Does the feature define which APIs, services, or events it requires?"
        section: APIs / Services
        type: required
        failure_signal: >
          The feature requires data exchange or side effects but does not define whether it
          uses internal APIs, external APIs, webhooks, background jobs, scheduled tasks,
          pub/sub events, or service calls.
        needs_human_review_if: >
          The feature crosses system boundaries but the communication contract is missing.

      - id: FN-07
        question: "Does the feature define what output it produces and what makes that output trustworthy?"
        section: Output Quality
        type: required
        failure_signal: >
          The feature produces a report, finding, score, recommendation, diagnosis, message,
          generated content, export, decision, or status without defining the evidence,
          criteria, validation, or reasoning that supports it.
        needs_human_review_if: >
          The output could be wrong, incomplete, subjective, model-dependent, outdated,
          or ambiguous, but the proposal does not define uncertainty, review, validation,
          or evidence display.

      - id: FN-08
        question: "Does the feature distinguish deterministic logic from AI-generated or heuristic judgment?"
        section: Analysis Method
        type: conditional
        failure_signal: >
          Rule-based logic, calculations, validations, model-generated judgment, heuristic
          scoring, and user-facing recommendations are mixed together without saying which
          layer produces which result.
        needs_human_review_if: >
          The feature depends on AI, rules, scoring, ranking, recommendations, classification,
          extraction, or prioritization, but deterministic logic and interpretive judgment
          are not separated.

      - id: FN-09
        question: "Are loading, empty, error, partial-success, permission, and retry states defined?"
        section: States
        type: required
        failure_signal: >
          The feature only describes the happy path and does not define what happens when
          data is missing, permission is denied, external services fail, processing is delayed,
          input is invalid, or only part of the operation succeeds.
        needs_human_review_if: >
          The feature depends on async data, external systems, background processing,
          permissions, generated output, payments, uploads, or user-created records, but
          user-facing states are absent.

      - id: FN-10
        question: "Can the feature become a binary, testable implementation spec?"
        section: Implementation Readiness
        type: required
        failure_signal: >
          The feature is described conceptually but cannot be turned into acceptance criteria
          that are verifiable without subjective judgment.
        needs_human_review_if: >
          BUILD would need to decide what counts as complete, correct, failed, useful,
          acceptable, or ready.

      - id: FN-11
        question: "Should this feature be built as product code, a spike, or deferred?"
        section: Sequencing
        type: required
        failure_signal: >
          Technically uncertain or strategically unproven features are moved directly into
          implementation instead of being validated through a smaller spike or postponed
          until the core loop is proven.
        needs_human_review_if: >
          The feature contains unresolved assumptions that could cause architectural,
          schema, UX, integration, or business-model rework if implemented too early.

      - id: FN-12
        question: "Does the feature require admin, support, configuration, or operational tooling?"
        section: Operational Support
        type: conditional
        failure_signal: >
          The feature creates records, workflows, customer states, payments, generated content,
          moderation needs, or support cases, but there is no way for internal users or admins
          to inspect, correct, retry, configure, or support it.
        needs_human_review_if: >
          The product could become difficult to operate after launch because user-facing
          functionality exists without internal operational support.

  # ─────────────────────────────────────────────
  # PAGES / ROUTES / APPLICATION SURFACES
  # ─────────────────────────────────────────────

  - artifact: pages_and_routes
    description: >
      Evaluates whether the application has a coherent page, route, view, and logical
      surface architecture. This artifact connects features to the places where users
      experience them. Must be specific enough that BUILD can understand which screens
      exist, what each screen is responsible for, what data it needs, which users can
      access it, and how users move through the product.

    questions:

      - id: AR-01
        question: "Are the main pages, routes, or logical surfaces of the application defined?"
        section: Page Architecture
        type: required
        failure_signal: >
          The proposal defines features but not where they live in the application,
          which routes or screens exist, or how users navigate between them.
        needs_human_review_if: >
          BUILD would need to invent page structure, routing, primary navigation,
          dashboard layout, detail pages, settings pages, or workflow surfaces.

      - id: AR-02
        question: "Does each page or surface have a clear purpose and ownership of user intent?"
        section: Page Purpose
        type: required
        failure_signal: >
          Pages are named but their purpose, primary action, secondary actions, data
          dependencies, and success states are not defined.
        needs_human_review_if: >
          A page could plausibly serve multiple unrelated user intents and BUILD would
          need to decide layout, hierarchy, or behavior.

      - id: AR-03
        question: "Are route access rules defined?"
        section: Routing / Access
        type: required
        failure_signal: >
          The proposal does not define which pages are public, authenticated, role-based,
          tenant-scoped, admin-only, paid-only, shareable, invite-only, or accessible
          through public links.
        needs_human_review_if: >
          The app has authentication, teams, permissions, paid plans, admin views,
          shared resources, private data, or public pages but route access rules are missing.

      - id: AR-04
        question: "Are page-level data requirements defined?"
        section: Page Data
        type: required
        failure_signal: >
          The proposal does not define which data each page loads, creates, updates,
          deletes, filters, paginates, subscribes to, derives, or submits.
        needs_human_review_if: >
          BUILD would need to invent API calls, queries, loading states, client-side state,
          cache rules, mutations, or data dependencies for the page.

      - id: AR-05
        question: "Are navigation paths between pages defined?"
        section: Navigation
        type: required
        failure_signal: >
          The proposal lists pages but does not define how users enter, move between,
          return from, complete workflows across, or recover from interruption between
          those pages.
        needs_human_review_if: >
          Key user journeys depend on transitions between pages that are not defined.

      - id: AR-06
        question: "Are page states defined?"
        section: Page States
        type: required
        failure_signal: >
          Pages are described only in their ideal state, without loading, empty, error,
          unauthorized, forbidden, partial data, success, read-only, onboarding, archived,
          or disabled states.
        needs_human_review_if: >
          The page depends on async data, permissions, external systems, payments,
          generated content, uploads, user-created records, or account state but
          state handling is missing.

      - id: AR-07
        question: "Are responsive, device, and platform expectations defined?"
        section: Responsive / Platform
        type: required
        failure_signal: >
          The proposal does not define whether pages must work on desktop, mobile,
          tablet, embedded views, native apps, browser extensions, or different viewport
          classes.
        needs_human_review_if: >
          Product usage context implies specific device behavior but the page architecture
          does not define it.

      - id: AR-08
        question: "Are admin, internal, and operational surfaces defined separately from user-facing surfaces?"
        section: Internal Surfaces
        type: conditional
        failure_signal: >
          The product likely needs admin, support, moderation, review, configuration,
          billing, analytics, customer management, operational retry, or debugging pages,
          but the proposal only defines user-facing screens.
        needs_human_review_if: >
          Internal operations are required to run the product but no internal interface
          or operational workflow is defined.

      - id: AR-09
        question: "Are settings and configuration surfaces defined?"
        section: Settings / Configuration
        type: conditional
        failure_signal: >
          The product has user preferences, organization settings, billing settings,
          integrations, API keys, notification preferences, roles, project settings,
          workspace configuration, or feature toggles, but no settings architecture
          is defined.
        needs_human_review_if: >
          Users or admins need to configure behavior but the app has no defined place
          for configuration.

      - id: AR-10
        question: "Are onboarding, first-run, and empty-product states defined?"
        section: Onboarding
        type: advisory
        failure_signal: >
          The proposal defines the application after data exists but not how a new user,
          new workspace, new project, or empty account gets started.
        needs_human_review_if: >
          Activation depends on first-run guidance, seed data, templates, imports,
          invitations, setup steps, or onboarding flows that are not represented.

      - id: AR-11
        question: "Are cross-page workflows represented clearly?"
        section: Cross-Page Workflows
        type: required
        failure_signal: >
          Features require the user to move across multiple pages, but the proposal does
          not define the workflow sequence, persisted state, navigation context, or
          completion path.
        needs_human_review_if: >
          The product includes multi-step processes, approvals, checkout, onboarding,
          creation flows, review flows, collaboration, publishing, import/export, or
          configuration flows without page-level coordination.

      - id: AR-12
        question: "Can the page architecture support the feature set without creating duplicate or conflicting surfaces?"
        section: Page Architecture
        type: advisory
        failure_signal: >
          Similar actions or data appear across multiple pages without clear ownership,
          increasing the risk of duplicated UI, inconsistent behavior, or unclear navigation.
        needs_human_review_if: >
          BUILD would need to decide whether a capability belongs in dashboard, detail page,
          settings, admin, modal, side panel, command menu, wizard, or external surface.

  # ─────────────────────────────────────────────
  # CROSS-ARTIFACT COHERENCE
  # ─────────────────────────────────────────────

  - artifact: cross_artifact
    description: >
      Evaluates whether the four implementation artifacts are internally coherent with each other.
      A technically complete artifact can still produce broken implementations if its assumptions
      contradict or ignore decisions made in sibling artifacts. These questions are evaluated
      after all four artifacts exist — not during individual generation phases.

    questions:

      - id: CA-01
        question: "Does stack.md define all infrastructure capabilities that schema.md depends on?"
        section: Stack / Schema Coherence
        type: required
        failure_signal: >
          schema.md references database features, RLS policies, triggers, extensions, replication,
          storage buckets, or external data services that are not declared in stack.md.
        needs_human_review_if: >
          A schema decision depends on a database or infrastructure capability that is not
          confirmed in the stack, or that conflicts with a stack constraint.

      - id: CA-02
        question: "Does schema.md define all entities and fields that architecture.md pages depend on?"
        section: Schema / Architecture Coherence
        type: required
        failure_signal: >
          architecture.md describes page data requirements, filters, queries, or state transitions
          that reference entities, fields, or relationships not defined in schema.md.
        needs_human_review_if: >
          A page or route loads, creates, or modifies data whose schema definition is absent
          or incomplete.

      - id: CA-03
        question: "Do feature specs reference only stack capabilities, schema entities, and routes that are defined?"
        section: Features / Sibling Artifacts Coherence
        type: required
        failure_signal: >
          A feature spec refers to a technology, API endpoint, database table, field,
          permission model, or page that is not defined in stack.md, schema.md, or architecture.md.
        needs_human_review_if: >
          BUILD would encounter undefined dependencies while implementing a feature spec.

      - id: CA-04
        question: "Does architecture.md contain a route or surface for every feature in features/?"
        section: Architecture / Features Coherence
        type: required
        failure_signal: >
          A feature spec describes user-facing behavior but there is no corresponding route,
          page, or surface defined in architecture.md that would host that behavior.
        needs_human_review_if: >
          The feature cannot be placed in the application without inventing a new surface.

  # ─────────────────────────────────────────────
  # STRATEGIC ALIGNMENT
  # ─────────────────────────────────────────────

  - artifact: strategic_alignment
    description: >
      Evaluates whether the technical artifacts are coherent with the strategic artifacts
      in Strategic Artifacts/ (product-thesis.md, user-architecture.md, product-architecture.md,
      objectives-architecture.md). Technical artifacts that contradict or ignore strategic
      decisions create implementation drift — features get built correctly but solve the
      wrong problem. These questions are evaluated using Strategic Artifacts/ as input context,
      which the Diagnostic Analyst reads alongside Input/Implementation/.

    questions:

      - id: SA-01
        question: "Does stack.md reflect constraints and principles stated in the product thesis?"
        section: Stack / Product Thesis
        type: required
        failure_signal: >
          product-thesis.md defines constraints such as simplicity, specific user expectations,
          vendor independence, privacy model, or cost model, but stack.md makes choices that
          conflict with or ignore those constraints without justification.
        needs_human_review_if: >
          A stack decision would be materially different if product thesis constraints were applied,
          or the thesis is silent on a choice that has strategic implications.

      - id: SA-02
        question: "Does schema.md model the user entities and ownership boundaries described in user-architecture.md?"
        section: Schema / User Architecture
        type: required
        failure_signal: >
          user-architecture.md defines user segments, roles, ownership relationships, or data
          boundaries, but schema.md does not model them, models them differently, or treats
          them as implementation details without acknowledging the divergence.
        needs_human_review_if: >
          The schema ownership model contradicts who the product thesis identifies as the
          primary owner of data or workflow.

      - id: SA-03
        question: "Does architecture.md reflect the product's core mode and primary workflows from product-architecture.md?"
        section: Architecture / Product Architecture
        type: required
        failure_signal: >
          product-architecture.md defines primary product modes, the core loop, or main workflows,
          but architecture.md page structure or navigation does not reflect them, or introduces
          surfaces and flows not grounded in the product architecture.
        needs_human_review_if: >
          The application structure would lead BUILD to implement a different product interaction
          model than what the product architecture defines.

      - id: SA-04
        question: "Are the features in features/ traceable to objectives in objectives-architecture.md?"
        section: Features / Objectives Architecture
        type: conditional
        failure_signal: >
          objectives-architecture.md defines strategic priorities, but features/ includes work
          that is not traceable to any objective, or omits features that are directly tied to
          high-priority objectives.
        needs_human_review_if: >
          The feature set could lead the PM agent to create issues for work that is misaligned
          with the current strategic objectives, or leave high-priority objectives without
          any implementation coverage.

